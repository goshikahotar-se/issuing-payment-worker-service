name: SonarCloud

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build, Test, SonarCloud Analyze
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin `
            /o:"goshikahotar-se" `
            /k:"goshikahotar-se_issuing-payment-worker-service" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="${env:SONAR_TOKEN}" `
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

      - name: Build
        run: dotnet build .\IssuingPayment.WorkerService.sln -c Release --no-incremental

      - name: Test with coverage
        run: dotnet test .\IssuingPayment.WorkerService.sln -c Release --no-build --collect:"XPlat Code Coverage" --settings .\coverlet.runsettings

      - name: SonarCloud End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${env:SONAR_TOKEN}"